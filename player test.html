<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

.player{
    position:relative;
    width:100vw;
    height:100vh;
}

.player video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.65),
        rgba(0,0,0,.15) 35%,
        transparent
    );
}

.info{
    position:absolute;
    left:120px;
    bottom:90px;
    color:#fff;
    font-size:48px;
    font-weight:300;
}

.live{
    color:#ff2d2d;
    font-size:28px;
    margin-top:10px;
}

.progress-container{
    position:absolute;
    left:0;
    right:0;
    bottom:40px;
    padding:0 30px;
}

.progress{
    height:8px;
    background:rgba(255,255,255,.25);
    border-radius:10px;
}

.progress-fill{
    width:70%;
    height:100%;
    background:#ff2020;
    border-radius:10px;
}

.play-btn{
    position:absolute;
    left:35px;
    bottom:85px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(255,255,255,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#444;
    font-size:32px;
    backdrop-filter:blur(8px);
}

.controls{
    position:absolute;
    right:30px;
    bottom:80px;
    display:flex;
    gap:12px;
}

.control{
    width:50px;
    height:50px;
    border-radius:50%;
    background:rgba(255,255,255,.85);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#444;
    font-size:20px;
}

.channel-logo{
    position:absolute;
    top:20px;
    right:20px;
    background:#d50000;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
}

.clock{
    position:absolute;
    top:20px;
    right:120px;
    color:white;
    font-size:24px;
}
</style>
</head>

<body>

<div class="player">

    <video autoplay muted loop>
        <source src="your-stream.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="clock">13:35</div>

    <div class="channel-logo">
        ECDF
    </div>

    <div class="play-btn">
        ❚❚
    </div>

    <div class="info">
        4:00pm | Partido Amistoso: Ecuador vs Guatemala
        <div class="live">LIVE</div>
    </div>

    <div class="controls">
        <div class="control">☰</div>
        <div class="control">❚❚</div>
        <div class="control">HD</div>
    </div>

    <div class="progress-container">
        <div class="progress">
            <div class="progress-fill"></div>
        </div>
    </div>

</div>

</body>
</html>
