<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fanatic TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

.player{
position:relative;
width:100vw;
height:100vh;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:#000;
}

/* FAKE FULLSCREEN FOR IOS */
.player.ios-fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
}

/* UI */
.ui{
position:absolute;
inset:0;
opacity:0;
transition:opacity .3s ease;
pointer-events:none;
}

.ui.show{
opacity:1;
pointer-events:auto;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.7), transparent);
}

.play-button{
position:absolute;
bottom:90px;
left:30px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
z-index:5;
}

.right-controls{
position:absolute;
right:25px;
bottom:85px;
display:flex;
gap:10px;
z-index:5;
}

.control{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
}

.channel-logo{
position:absolute;
top:20px;
right:20px;
background:#c70000;
color:#fff;
padding:10px 15px;
border-radius:8px;
}

.clock{
position:absolute;
top:20px;
right:120px;
color:white;
font-size:24px;
}

.channel-name{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="player" id="player">

<video id="video"
autoplay
muted
playsinline
webkit-playsinline></video>

<div class="ui" id="ui">

<div class="overlay"></div>

<div class="clock" id="clock">00:00</div>

<div class="channel-logo">FANATIC TV</div>

<div class="play-button" id="playBtn">❚❚</div>

<div class="right-controls">
<div class="control" id="fullscreenBtn">⛶</div>
</div>

<div class="channel-name">Fanatic TV Sports</div>

</div>

</div>

<script>

const video = document.getElementById("video");
const player = document.getElementById("player");
const ui = document.getElementById("ui");

const streamUrl = "https://streamvidex.qzz.io/latamplay/cazetv/index.m3u8";

/* =========================
   HLS
========================= */
if (Hls.isSupported()) {
const hls = new Hls();
hls.loadSource(streamUrl);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
} else {
video.src = streamUrl;
}

/* =========================
   UI CONTROL
========================= */
let hideTimer;

function showUI(){
ui.classList.add("show");
clearTimeout(hideTimer);
hideTimer = setTimeout(() => {
if(!video.paused) ui.classList.remove("show");
}, 2500);
}

function hideUI(){
ui.classList.remove("show");
}

/* tap = show UI */
player.addEventListener("touchstart", showUI);

/* =========================
   PLAY / PAUSE
========================= */
document.getElementById("playBtn").onclick = () => {
if(video.paused){
video.play();
hideUI();
}else{
video.pause();
showUI();
}
};

/* =========================
   FULLSCREEN SAFE (ANDROID + IOS)
========================= */
const fullscreenBtn = document.getElementById("fullscreenBtn");

fullscreenBtn.onclick = async () => {

const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if(isIOS){
player.classList.add("ios-fullscreen");
showUI();
return;
}

try{
if(!document.fullscreenElement){
await player.requestFullscreen();
}else{
await document.exitFullscreen();
}
}catch(e){}
};

/* =========================
   CLOCK
========================= */
function updateClock(){
const now = new Date();
document.getElementById("clock").innerHTML =
now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}
setInterval(updateClock,1000);
updateClock();

showUI();

</script>

</body>
</html>
