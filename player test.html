<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanatic TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

.player{
position:relative;
width:100vw;
height:100vh;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:#000;
display:block;
}

/* ONLY fullscreen sizing (no UI logic here) */
.player:fullscreen{
width:100vw;
height:100vh;
background:#000;
}

/* UI hidden state controlled ONLY by JS */
.player.hide-ui .overlay,
.player.hide-ui .play-button,
.player.hide-ui .program-info,
.player.hide-ui .right-controls,
.player.hide-ui .clock,
.player.hide-ui .channel-logo,
.player.hide-ui .channel-name,
.player.hide-ui .progress-container{
display:none !important;
}

/* UI ELEMENTS */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.8),
rgba(0,0,0,.2) 40%,
transparent
);
pointer-events:none;
}

.play-button{
position:absolute;
bottom:90px;
left:30px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
color:#333;
cursor:pointer;
z-index:5;
}

.program-info{
position:absolute;
left:140px;
bottom:95px;
color:white;
z-index:5;
}

.program-title{
font-size:42px;
font-weight:300;
}

.live{
margin-top:8px;
font-size:24px;
font-weight:bold;
color:red;
}

.right-controls{
position:absolute;
right:25px;
bottom:85px;
display:flex;
gap:10px;
z-index:5;
}

.control{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
color:#333;
font-weight:bold;
cursor:pointer;
user-select:none;
}

.channel-logo{
position:absolute;
top:20px;
right:20px;
background:#c70000;
color:#fff;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
z-index:5;
}

.clock{
position:absolute;
top:20px;
right:120px;
color:white;
font-size:24px;
z-index:5;
}

.channel-name{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:20px;
font-weight:bold;
z-index:5;
}
</style>
</head>

<body>

<div class="player" id="player">

<video id="video" autoplay muted playsinline></video>

<div class="overlay"></div>

<div class="clock" id="clock">00:00</div>

<div class="channel-logo">FANATIC TV</div>

<div class="play-button" id="playBtn">❚❚</div>

<div class="program-info">
<div class="program-title">CAZE TV</div>
<div class="live">LIVE</div>
</div>

<div class="right-controls">
<div class="control" id="playPauseBtn">⏸</div>
<div class="control">HD</div>
<div class="control" id="fullscreenBtn">⛶</div>
</div>

<div class="channel-name">Fanatic TV Sports</div>

</div>

<script>

const video = document.getElementById("video");
const player = document.getElementById("player");
const fullscreenBtn = document.getElementById("fullscreenBtn");

const streamUrl =
"https://streamvidex.qzz.io/latamplay/cazetv/index.m3u8";

/* =========================
   HLS
========================= */
if (Hls.isSupported()) {

const hls = new Hls({
enableWorker: true,
lowLatencyMode: true
});

hls.loadSource(streamUrl);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED, () => {
video.play().catch(() => {});
});

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {

video.src = streamUrl;

video.addEventListener('loadedmetadata', () => {
video.play().catch(() => {});
});
}

/* =========================
   PLAY / PAUSE
========================= */
const playBtn = document.getElementById("playBtn");
const playPauseBtn = document.getElementById("playPauseBtn");

function togglePlay() {
if (video.paused) {
video.play();
playBtn.innerHTML = "❚❚";
playPauseBtn.innerHTML = "⏸";
} else {
video.pause();
playBtn.innerHTML = "▶";
playPauseBtn.innerHTML = "▶";
}
}

playBtn.onclick = togglePlay;
playPauseBtn.onclick = togglePlay;

/* =========================
   FULLSCREEN
========================= */
fullscreenBtn.onclick = async () => {
try {
if (!document.fullscreenElement) {
await player.requestFullscreen();
player.classList.add("hide-ui"); // start clean
} else {
await document.exitFullscreen();
player.classList.remove("hide-ui");
}
} catch (e) {
console.log(e);
}
};

/* =========================
   PAUSE = SHOW UI (fullscreen only)
========================= */
video.addEventListener("pause", () => {
if (document.fullscreenElement) {
player.classList.remove("hide-ui");
}
});

/* PLAY = HIDE UI */
video.addEventListener("play", () => {
if (document.fullscreenElement) {
player.classList.add("hide-ui");
}
});

/* EXIT FULLSCREEN RESET */
document.addEventListener("fullscreenchange", () => {
if (!document.fullscreenElement) {
player.classList.remove("hide-ui");
}
});

/* =========================
   CLOCK
========================= */
function updateClock() {
const now = new Date();
document.getElementById("clock").innerHTML =
now.toLocaleTimeString([], {
hour: "2-digit",
minute: "2-digit"
});
}

setInterval(updateClock, 1000);
updateClock();

</script>

</body>
</html>
