<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitmovin Player Example</title>

    <!-- Bitmovin Player -->
    <script src="https://cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100%;
            height: 100%;
        }

        #player-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="player-container"></div>

    <script>
        const conf = {
            key: '<YOUR PLAYER KEY>'
        };

        const source = {
            dash: 'https://bitmovin-a.akamaihd.net/498364_fcb0257026d0bd3ee0ba3aad95674188/manifest.mpd',
            hls: 'https://bitmovin-a.akamaihd.net/498364_fcb0257026d0bd3ee0ba3aad95674188/playlist.m3u8',
            poster: 'https://bitmovin-a.akamaihd.net/498364_fcb0257026d0bd3ee0ba3aad95674188/poster.jpg'
        };

        let hidden = false;
        let played = false;

        const playerContainer = document.getElementById('player-container');

        bitmovin.player.Player.addModule(
            bitmovin.analytics.PlayerModule
        );

        const player = new bitmovin.player.Player(
            playerContainer,
            conf
        );

        player.load(source).then(function () {

            player.on(
                bitmovin.player.PlayerEvent.TimeChanged,
                function () {
                    if (
                        player.getCurrentTime() >= 29.081333 &&
                        player.getCurrentTime() < 41.138666
                    ) {
                        const topBar = document.getElementsByClassName(
                            'bmpui-ui-container bmpui-controlbar-top'
                        )[0];

                        if (topBar) {
                            topBar.style.display = 'none';
                        }

                        hidden = true;
                        played = true;
                    } else if (hidden) {
                        const topBar = document.getElementsByClassName(
                            'bmpui-ui-container bmpui-controlbar-top'
                        )[0];

                        if (topBar) {
                            topBar.style.display = 'block';
                        }
                    }
                }
            );

            player.on(
                bitmovin.player.PlayerEvent.Seek,
                function (data) {
                    if (data.seekTarget > 29 && !played) {
                        player.seek(29);
                        played = true;
                    }
                }
            );

        }).catch(function (error) {
            console.error('Error while loading source:', error);
        });
    </script>

</body>
</html>
