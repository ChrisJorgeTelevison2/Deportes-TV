<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fanatic TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
touch-action:none;
}

.player{
position:relative;
width:100vw;
height:100vh;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* UI fade system */
.ui{
opacity:0;
transition:opacity .35s ease;
pointer-events:none;
}

.ui.show{
opacity:1;
pointer-events:auto;
}

/* UI elements */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.7), transparent);
}

.play-button{
position:absolute;
bottom:90px;
left:30px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
z-index:5;
}

.program-info{
position:absolute;
left:140px;
bottom:95px;
color:white;
z-index:5;
}

.live{ color:red; font-weight:bold; }

.right-controls{
position:absolute;
right:25px;
bottom:85px;
display:flex;
gap:10px;
z-index:5;
}

.control{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
}

.channel-logo{
position:absolute;
top:20px;
right:20px;
background:#c70000;
color:#fff;
padding:10px 15px;
border-radius:8px;
}

.clock{
position:absolute;
top:20px;
right:120px;
color:white;
font-size:24px;
}

.channel-name{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="player" id="player">

<video id="video" autoplay muted playsinline></video>

<div class="ui" id="ui">

<div class="overlay"></div>

<div class="clock" id="clock">00:00</div>

<div class="channel-logo">FANATIC TV</div>

<div class="play-button" id="playBtn">❚❚</div>

<div class="program-info">
<div class="program-title">CAZE TV</div>
<div class="live">LIVE</div>
</div>

<div class="right-controls">
<div class="control" id="fullscreenBtn">⛶</div>
</div>

<div class="channel-name">Fanatic TV Sports</div>

</div>

</div>

<script>

const video = document.getElementById("video");
const ui = document.getElementById("ui");
const playBtn = document.getElementById("playBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const player = document.getElementById("player");

const streamUrl = "https://streamvidex.qzz.io/latamplay/cazetv/index.m3u8";

/* =========================
   HLS
========================= */
if (Hls.isSupported()) {
const hls = new Hls();
hls.loadSource(streamUrl);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
} else {
video.src = streamUrl;
}

/* =========================
   UI SYSTEM
========================= */
let hideTimer;

function showUI(){
ui.classList.add("show");
resetTimer();
}

function hideUI(){
ui.classList.remove("show");
}

function resetTimer(){
clearTimeout(hideTimer);
hideTimer = setTimeout(() => {
if(video.paused === false){
hideUI();
}
}, 2500);
}

/* =========================
   TAP CONTROLS (MOBILE)
========================= */
let lastTap = 0;

player.addEventListener("touchend", (e) => {
const now = new Date().getTime();

if(now - lastTap < 300){
togglePlay(); // double tap
}else{
showUI(); // single tap
}

lastTap = now;
});

/* =========================
   SWIPE CONTROLS
========================= */
let startX, startY;

player.addEventListener("touchstart", (e) => {
startX = e.touches[0].clientX;
startY = e.touches[0].clientY;
});

player.addEventListener("touchend", (e) => {
let dx = e.changedTouches[0].clientX - startX;
let dy = e.changedTouches[0].clientY - startY;

if(Math.abs(dx) > 50){
if(dx > 0){
video.currentTime += 5; // right swipe
}else{
video.currentTime -= 5; // left swipe
}
}

if(Math.abs(dy) > 50){
if(dy < 0){
video.volume = Math.min(1, video.volume + 0.1); // up
}else{
video.volume = Math.max(0, video.volume - 0.1); // down
}
}

});

/* =========================
   PLAY / PAUSE
========================= */
function togglePlay(){
if(video.paused){
video.play();
playBtn.innerHTML = "❚❚";
hideUI();
}else{
video.pause();
playBtn.innerHTML = "▶";
showUI();
}
}

playBtn.onclick = togglePlay;

/* =========================
   FULLSCREEN (MOBILE SAFE)
========================= */
fullscreenBtn.onclick = async () => {
try {
if(!document.fullscreenElement){
await player.requestFullscreen?.();
}else{
await document.exitFullscreen?.();
}
} catch(e){}
};

/* =========================
   CLOCK
========================= */
function updateClock(){
const now = new Date();
document.getElementById("clock").innerHTML =
now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}
setInterval(updateClock,1000);
updateClock();

/* init */
showUI();

</script>

</body>
</html>
