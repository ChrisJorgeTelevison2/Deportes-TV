<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shaka Player Example</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
    }

    #video {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
  const video = document.getElementById('video');

  const manifest = {
    dash: 'https://bitmovin-a.akamaihd.net/498364_fcb0257026d0bd3ee0ba3aad95674188/manifest.mpd',
    hls: 'https://streamvidex.qzz.io/latamplay/cazetv/index.m3u8'
  };

  let hidden = false;
  let played = false;

  async function initPlayer() {
    const player = new shaka.Player(video);

    // Optional: better error logging
    player.addEventListener('error', (e) => console.error(e));

    // Choose source (Shaka prefers DASH, fallback manually if needed)
    const src = manifest.dash || manifest.hls;

    await player.load(src);

    // Time tracking
    video.addEventListener('timeupdate', () => {
      const t = video.currentTime;

      if (t >= 29.081333 && t < 41.138666) {
        video.controls = false;
        hidden = true;
        played = true;
      } else if (hidden) {
        video.controls = true;
      }
    });

    // Prevent seeking past 29s (same logic as your Bitmovin code)
    video.addEventListener('seeking', () => {
      if (video.currentTime > 29 && !played) {
        video.currentTime = 29;
        played = true;
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
