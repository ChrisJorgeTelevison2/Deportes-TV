<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanatic TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

.player{
position:relative;
width:100vw;
height:100vh;
background:#000;
}

/* smooth fade system */
.fade{
opacity:0;
transition:opacity .4s ease;
pointer-events:none;
}

.show{
opacity:1 !important;
pointer-events:auto;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* UI */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,.75), transparent);
}

.play-button{
position:absolute;
bottom:90px;
left:30px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
cursor:pointer;
z-index:5;
}

.program-info{
position:absolute;
left:140px;
bottom:95px;
color:white;
z-index:5;
}

.live{ color:red; font-weight:bold; }

.right-controls{
position:absolute;
right:25px;
bottom:85px;
display:flex;
gap:10px;
z-index:5;
}

.control{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,.9);
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.channel-logo{
position:absolute;
top:20px;
right:20px;
background:#c70000;
color:#fff;
padding:10px 15px;
border-radius:8px;
}

.clock{
position:absolute;
top:20px;
right:120px;
color:white;
font-size:24px;
}

.channel-name{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="player" id="player">

<video id="video" autoplay muted playsinline></video>

<div class="overlay fade" id="ui"></div>

<div class="clock fade" id="clock">00:00</div>

<div class="channel-logo fade"></div>

<div class="play-button fade" id="playBtn">❚❚</div>

<div class="program-info fade">
<div class="program-title">CAZE TV</div>
<div class="live">LIVE</div>
</div>

<div class="right-controls fade">
<div class="control" id="playPauseBtn">⏸</div>
<div class="control" id="fullscreenBtn">⛶</div>
</div>

<div class="channel-name fade">Fanatic TV Sports</div>

</div>

<script>

const video = document.getElementById("video");
const player = document.getElementById("player");

const uiElements = document.querySelectorAll(".fade");

const playBtn = document.getElementById("playBtn");
const playPauseBtn = document.getElementById("playPauseBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");

const streamUrl = "https://serendipity.loreofeldenring.site/dailymotion/live/playlist/1.m3u8";

/* =========================
   HLS
========================= */
if (Hls.isSupported()) {
const hls = new Hls();
hls.loadSource(streamUrl);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
} else {
video.src = streamUrl;
}

/* =========================
   PLAY / PAUSE
========================= */
function togglePlay(){
if(video.paused){
video.play();
playBtn.innerHTML = "❚❚";
playPauseBtn.innerHTML = "⏸";
hideUI();
}else{
video.pause();
playBtn.innerHTML = "▶";
playPauseBtn.innerHTML = "▶";
showUI();
}
}

playBtn.onclick = togglePlay;
playPauseBtn.onclick = togglePlay;

/* =========================
   FULLSCREEN
========================= */
fullscreenBtn.onclick = async () => {
if(!document.fullscreenElement){
await player.requestFullscreen();
hideUI();
}else{
await document.exitFullscreen();
showUI();
}
};

/* =========================
   UI SYSTEM (IMPORTANT)
========================= */

let hideTimer;

function showUI(){
uiElements.forEach(el => el.classList.add("show"));
resetTimer();
}

function hideUI(){
uiElements.forEach(el => el.classList.remove("show"));
}

function resetTimer(){
clearTimeout(hideTimer);
hideTimer = setTimeout(() => {
if(document.fullscreenElement && !video.paused){
hideUI();
}
}, 3000);
}

/* mouse/keyboard shows UI */
document.addEventListener("mousemove", showUI);
document.addEventListener("keydown", (e) => {
showUI();

if(e.code === "Space"){
e.preventDefault();
togglePlay();
}

/* volume */
if(e.code === "ArrowUp"){
video.volume = Math.min(1, video.volume + 0.1);
}

if(e.code === "ArrowDown"){
video.volume = Math.max(0, video.volume - 0.1);
}

/* seek */
if(e.code === "ArrowRight"){
video.currentTime += 5;
}

if(e.code === "ArrowLeft"){
video.currentTime -= 5;
}
});

/* pause/play UI rules */
video.addEventListener("pause", showUI);
video.addEventListener("play", () => {
if(document.fullscreenElement) hideUI();
});

/* clock */
function updateClock(){
const now = new Date();
document.getElementById("clock").innerHTML =
now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}
setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
