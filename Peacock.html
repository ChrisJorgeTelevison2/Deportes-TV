<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxify TV</title>

<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#player-container {
  position: relative;
  width: 100%;
  height: 100%;
}

#player-wrapper {
  width: 100%;
  height: 100%;
}

#overlay-title {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 22px;
  font-weight: bold;
  text-shadow: 0 0 5px #000;
  z-index: 1000;
  pointer-events: none;
}

.watermark {
  position: absolute;
  z-index: 999;
  pointer-events: none;
}

.top-left {
  top: 10px;
  left: 10px;
  max-width: 150px;
  max-height: 60px;
}

.top-right {
  top: 5px;
  right: 5px;
  max-width: 40px;
  max-height: 18px;
  opacity: 0.6;
}

.watermark img {
  max-width: 100%;
  max-height: 100%;
}
</style>
</head>

<body>

<div id="player-container">
  <div id="overlay-title">Fluxify TV</div>
  <div id="player-wrapper"></div>
</div>

<script>
const siteName = "Fluxify TV";

const tvIconLeft =
  "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhH4RViNO5WYJnkh72TMJAte4E7CmlaSIQCe9mlmfH-R8R6eaxHH5Xm_SlY5ZI1yD6j1lqz8VLU7WbEWCDYqdpmf4iDrPtoSyTdJRGWvK8LacZ5cA_UO9x1Q-M_lZb-jZQSCRSoqHEf7kQ0Cm7Lz7itm6nMQzxqUvBfJRQCUccWUaeOJlI17nird00dgYOX/s320/fluxify.png";

const tvIconRight =
  "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjj0W_dkjDxQb4r9YHJZTAiMUocbrY2jpB83WrAc62kWbWXg3LnZEYUeISBT14MotoyBr-3nBEnmwm0jXSMhrNJIAy5uLPz-eNZOXAInNFKVnPwchgGWMZg7p07J2JjrSXzaxBflGw5IREbwi7M5INFdpThJXqbLZnWs9juFdhYkf9kxuRJ_G9Fl3lG23Lk/s521/3dheart-removebg-preview.png";

const TVWatermarkPlugin = Clappr.UIContainerPlugin.extend({
  name: "tv_watermark",

  initialize() {
    this.render();
  },

  render() {
    const left = document.createElement("div");
    left.className = "watermark top-left";
    left.innerHTML = `<img src="${tvIconLeft}">`;
    this.container.$el.append(left);

    const right = document.createElement("div");
    right.className = "watermark top-right";
    right.innerHTML = `<img src="${tvIconRight}">`;
    this.container.$el.append(right);
  }
});

const player = new Clappr.Player({
  parentId: "#player-wrapper",
  source: "https://live20.bozztv.com/giatv/giatv-Eventos-ChrisJorgeTelevison2/Eventos-ChrisJorgeTelevison2/chunks.m3u8",
  autoPlay: true,
  mute: true,
  width: "100%",
  height: "100%",
  plugins: [TVWatermarkPlugin]
});

player.on(Clappr.Events.PLAYER_READY, function () {

  if ("mediaSession" in navigator) {

    navigator.mediaSession.metadata = new MediaMetadata({
      title: siteName,
      artist: "Live TV",
      album: siteName,
      artwork: [
        {
          src: tvIconLeft,
          sizes: "512x512",
          type: "image/png"
        }
      ]
    });

    navigator.mediaSession.setActionHandler("play", () => {});
    navigator.mediaSession.setActionHandler("pause", () => {});
  }
});
</script>

</body>
</html>

</body>
</html>
