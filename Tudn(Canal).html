<!--DOCTYPE html-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      font-family: sans-serif;
      overflow: hidden; /* remove scrollbars */
    }

    #player-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #overlay-title {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      z-index: 1000;
      pointer-events: none;
    }

    .watermark {
      position: absolute;
      z-index: 999;
      pointer-events: none;
      opacity: 0.7;
    }

    /* Bigger top-left watermark */
    .top-left {
      top: 10px;
      left: 10px;
      max-width: 150px;
      max-height: 60px;
    }

    /* Tiny top-right watermark */
    .top-right {
      top: 3px;
      right: 3px;
      max-width: 40px;
      max-height: 18px;
      opacity: 0.6;
    }

    .watermark img {
      max-width: 100%;
      max-height: 100%;
      background: transparent;
    }

    #player-wrapper {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div id="player-container">
    <div id="overlay-title"></div>
    <div id="player-wrapper"></div>
  </div>

  <script>
    // Left watermark image
    const tvIconLeft = 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhH4RViNO5WYJnkh72TMJAte4E7CmlaSIQCe9mlmfH-R8R6eaxHH5Xm_SlY5ZI1yD6j1lqz8VLU7WbEWCDYqdpmf4iDrPtoSyTdJRGWvK8LacZ5cA_UO9x1Q-M_lZb-jZQSCRSoqHEf7kQ0Cm7Lz7itm6nMQzxqUvBfJRQCUccWUaeOJlI17nird00dgYOX/s320/fluxify.png';

    // Right watermark image
    const tvIconRight = 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjj0W_dkjDxQb4r9YHJZTAiMUocbrY2jpB83WrAc62kWbWXg3LnZEYUeISBT14MotoyBr-3nBEnmwm0jXSMhrNJIAy5uLPz-eNZOXAInNFKVnPwchgGWMZg7p07J2JjrSXzaxBflGw5IREbwi7M5INFdpThJXqbLZnWs9juFdhYkf9kxuRJ_G9Fl3lG23Lk/s521/3dheart-removebg-preview.png';

    const TVWatermarkPlugin = Clappr.UIContainerPlugin.extend({
      name: 'tv_watermark',
      initialize() {
        this.render();
      },
      render() {
        // Top-left watermark
        const topLeft = document.createElement('div');
        topLeft.className = 'watermark top-left';
        topLeft.innerHTML = `<img src="${tvIconLeft}" />`;
        this.container.$el.append(topLeft);

        // Top-right watermark
        const topRight = document.createElement('div');
        topRight.className = 'watermark top-right';
        topRight.innerHTML = `<img src="${tvIconRight}" />`;
        this.container.$el.append(topRight);
      }
    });

    new Clappr.Player({
      parentId: '#player-wrapper',
      source: 'https://streaming-live-fcdn.api.prd.univisionnow.com/tudn/tudn.isml/hls/tudn-audio_eng=128000-video=6000000.m3u8',
      poster: '',
      mute: true,
      height: '100%',
      width: '100%',
      plugins: [TVWatermarkPlugin],
      autoPlay: true
    });
  </script>

</body>
</html>
